name: Update Electrical Task List Website

on:
  schedule:
    # Runs every hour (adjust CRON schedule as needed)
    - cron: '0 * * * *'
  workflow_dispatch: # Allows you to run it manually anytime

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v7

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 20

    - name: Fetch ClickUp Data & Build HTML
      env:
        CLICKUP_ELECTRICAL_TASK_LIST_ID: ${{ secrets.CLICKUP_ELECTRICAL_TASK_LIST_ID }}
        CLICKUP_API_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}
      run: node fetch-clickup.js
    
    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add index.html
        # Only commit if index.html actually changed to avoid empty commit errors
        git diff-index --quiet HEAD || git commit -m "Automated ClickUp data sync"
        git push